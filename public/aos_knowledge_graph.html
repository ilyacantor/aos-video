<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOS Knowledge Graph — Account Relationships</title>
<script src="vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #464A58;
    color: #e2e8f0;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  #app {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    background: #0a0a0a;
    border-right: 1px solid #1a1a1a;
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    z-index: 10;
  }
  #sidebar h1 {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.3px;
  }
  #sidebar .subtitle {
    font-size: 10px;
    color: #666;
    margin-top: 2px;
  }
  .stat-row {
    display: flex;
    gap: 8px;
  }
  .stat-card {
    flex: 1;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .stat-card .val {
    font-size: 18px;
    font-weight: 700;
    color: #22d3ee;
  }
  .stat-card .lbl {
    font-size: 8px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .section-label {
    font-size: 9px;
    font-weight: 600;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: #888;
    margin-bottom: 5px;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-line {
    width: 20px;
    height: 0;
    flex-shrink: 0;
  }
  select {
    background: #111;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 5px;
    padding: 5px 7px;
    font-size: 10px;
    cursor: pointer;
    width: 100%;
  }
  select:hover { border-color: #22d3ee; }

  /* ── Graph container ── */
  #main {
    flex: 1;
    position: relative;
    min-width: 0;
    overflow: hidden;
    background: #0B1220;
  }
  #graph-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* ── Details panel ── */
  #details {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 240px;
    background: #0a0a0aee;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 16px;
    display: none;
    backdrop-filter: blur(12px);
    z-index: 20;
  }
  #details.visible { display: block; }
  #details h3 {
    font-size: 13px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #details .close-btn {
    cursor: pointer;
    color: #555;
    font-size: 18px;
    border: none;
    background: none;
    width: auto;
    padding: 0;
  }
  #details .close-btn:hover { color: #f1f5f9; }
  .field { margin-bottom: 6px; }
  .field-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #555;
    margin-bottom: 1px;
  }
  .field-value {
    font-size: 11px;
    color: #ccc;
  }
  .badge {
    display: inline-block;
    font-size: 8px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.3px;
  }
  .badge-cross { background: #3b0a0a; color: #f87171; }
  .badge-intra { background: #0a2a2a; color: #67e8f9; }

  /* ── Zoom controls ── */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
    z-index: 20;
  }
  .zoom-btn {
    width: 30px;
    height: 30px;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #888;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .zoom-btn:hover { border-color: #22d3ee; color: #22d3ee; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div>
      <h1>AOS Knowledge Graph</h1>
      <div class="subtitle">Multi-modal account relationships</div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="val" id="s-nodes">0</div><div class="lbl">Nodes</div></div>
      <div class="stat-card"><div class="val" id="s-edges">0</div><div class="lbl">Edges</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="val" id="s-domains">0</div><div class="lbl">Domains</div></div>
      <div class="stat-card"><div class="val" id="s-depth">0</div><div class="lbl">Depth</div></div>
    </div>

    <div>
      <div class="section-label">Layout</div>
      <select id="layout-select">
        <option value="force" selected>Force-Directed</option>
        <option value="hierarchical">Hierarchical</option>
      </select>
    </div>

    <div>
      <div class="section-label">Domains</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#7c3aed"></div>Finance</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#16a34a"></div>Operations</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#dc2626"></div>HR / People</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#2563eb"></div>Legal</div>
    </div>

    <div>
      <div class="section-label">Edges</div>
      <div class="legend-item">
        <div class="legend-line" style="border-top: 1.5px solid #333;"></div>
        Intra-domain
      </div>
      <div class="legend-item">
        <div class="legend-line" style="border-top: 1.5px dashed #dc2626;"></div>
        Cross-domain
      </div>
    </div>
  </div>

  <div id="main">
    <div id="graph-container"></div>

    <div id="details">
      <h3><span id="detail-title"></span><span class="close-btn" onclick="closeDetails()">&times;</span></h3>
      <div id="detail-content"></div>
    </div>

    <div class="zoom-controls">
      <div class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</div>
      <div class="zoom-btn" onclick="zoomOut()" title="Zoom out">&minus;</div>
      <div class="zoom-btn" onclick="fitAll()" title="Fit all">&#x2922;</div>
    </div>
  </div>
</div>

<script>
// ─── Node config: domain color drives everything ──────────────
// Large circles with white labels inside — matching reference style
const domainColors = {
  Finance:    '#7c3aed',
  Operations: '#16a34a',
  HR:         '#dc2626',
  Legal:      '#2563eb',
};

// Brighter/lighter variants for important nodes
const rootColor = '#06b6d4';

const graphNodes = [
  // Root
  { id: 'meridian',    label: 'Meridian',               domain: 'Finance',    size: 48, isRoot: true,
    meta: { type: 'Account', value: '$5B consultancy', entity_id: 'meridian' }},

  // Tier 1 — direct connections
  { id: 'contract',    label: 'MSA-2024-017',           domain: 'Finance',    size: 36,
    meta: { type: 'Contract', value: 'Master Services Agreement', status: 'Active' }},
  { id: 'segment',     label: 'Financial\nServices',    domain: 'Finance',    size: 32,
    meta: { type: 'Segment', value: 'Industry vertical', tier: 'Tier 1' }},
  { id: 'engagement',  label: '4 Active',               domain: 'Operations', size: 34,
    meta: { type: 'Engagement', value: 'Active engagements', types: 'Advisory, Audit, Integration, Ops' }},
  { id: 'owner',       label: 'Sarah\nChen',            domain: 'HR',         size: 30,
    meta: { type: 'Owner', value: 'Managing Director', department: 'Client Services' }},

  // Tier 2
  { id: 'revenue',     label: '$13.4M',                 domain: 'Finance',    size: 30,
    meta: { type: 'Revenue', value: 'Annual contract revenue', recognition: 'ASC 606' }},
  { id: 'deliverable', label: 'SOW-003',                domain: 'Operations', size: 26,
    meta: { type: 'Deliverable', value: 'Statement of work', completion: '62%' }},
  { id: 'terms',       label: 'Net 30',                 domain: 'Legal',      size: 22,
    meta: { type: 'Terms', value: 'Payment terms', billing: 'Monthly arrears' }},
  { id: 'team',        label: '12 FTE',                 domain: 'Operations', size: 26,
    meta: { type: 'Team', value: 'Staffed headcount', utilization: '87%' }},
  { id: 'practice',    label: 'Advisory',               domain: 'Operations', size: 24,
    meta: { type: 'Practice', value: 'Practice area', head: 'J. Martinez' }},

  // Tier 3
  { id: 'period',      label: 'Q1 2026',                domain: 'Finance',    size: 22,
    meta: { type: 'Period', value: 'Fiscal quarter', start: '2026-01-01', end: '2026-03-31' }},
  { id: 'org',         label: 'Partner\nGroup',         domain: 'HR',         size: 22,
    meta: { type: 'Org Unit', value: 'Organizational unit', level: 'L1' }},
];

const graphEdges = [
  // Meridian direct
  { from: 'meridian',   to: 'contract',    label: 'has',            cross: false },
  { from: 'meridian',   to: 'segment',     label: 'belongs_to',     cross: false },
  { from: 'meridian',   to: 'engagement',  label: 'has',            cross: false },
  { from: 'meridian',   to: 'owner',       label: 'owned_by',       cross: true  },

  // Contract cascade
  { from: 'contract',   to: 'revenue',     label: 'generates',      cross: false },
  { from: 'contract',   to: 'deliverable', label: 'scopes',         cross: false },
  { from: 'contract',   to: 'terms',       label: 'governed_by',    cross: false },

  // Revenue → Period
  { from: 'revenue',    to: 'period',      label: 'recognized_in',  cross: false },

  // Segment branches
  { from: 'segment',    to: 'period',      label: 'reported_in',    cross: false },
  { from: 'segment',    to: 'practice',    label: 'mapped_to',      cross: false },

  // Engagement branches
  { from: 'engagement', to: 'team',        label: 'staffed_by',     cross: false },
  { from: 'engagement', to: 'deliverable', label: 'delivers',       cross: false },

  // Cross-domain (HR ↔ Finance/Ops)
  { from: 'owner',      to: 'engagement',  label: 'manages',        cross: true  },
  { from: 'owner',      to: 'org',         label: 'reports_to',     cross: true  },
];


// ─── Build vis datasets ──────────────────────────────────
function buildVisNodes() {
  return graphNodes.map(n => {
    const bg = n.isRoot ? rootColor : domainColors[n.domain] || '#555';
    return {
      id: n.id,
      label: n.label,
      shape: 'dot',
      size: n.size,
      color: {
        background: bg,
        border: bg,
        highlight: { background: bg, border: '#ffffff' },
        hover: { background: bg, border: '#ffffffaa' }
      },
      borderWidth: 0,
      font: {
        color: '#ffffff',
        size: n.isRoot ? 16 : 13,
        face: 'Inter, Segoe UI, system-ui, sans-serif',
        vadjust: 0,
        multi: 'html'
      },
      shadow: {
        enabled: true,
        color: bg + '55',
        size: n.isRoot ? 30 : 16,
        x: 0, y: 0
      },
      nodeData: n
    };
  });
}

function buildVisEdges() {
  return graphEdges.map((e, i) => ({
    id: 'e' + i,
    from: e.from,
    to: e.to,
    color: {
      color: e.cross ? '#dc2626bb' : '#ffffff55',
      highlight: e.cross ? '#dc2626' : '#ffffffbb',
      hover: e.cross ? '#dc2626dd' : '#ffffff88'
    },
    width: e.cross ? 2.6 : 2.0,
    dashes: e.cross ? [8, 5] : false,
    arrows: { to: { enabled: true, scaleFactor: 0.4, type: 'arrow' }},
    smooth: { type: 'continuous' },
    hoverWidth: 0.5,
    edgeData: e
  }));
}


// ─── Layout options ──────────────────────────────────────
function getLayoutOptions() {
  const layoutType = document.getElementById('layout-select').value;

  const base = {
    nodes: {
      borderWidth: 0,
      shadow: true,
      chosen: {
        node: function(values, id, selected, hovering) {
          if (selected) {
            values.borderWidth = 3;
            values.borderColor = '#ffffff';
            values.shadowColor = 'rgba(255, 255, 255, 0.3)';
            values.shadowSize = 25;
          }
        }
      }
    },
    edges: {
      smooth: { type: 'continuous' }
    },
    interaction: {
      hover: true,
      tooltipDelay: 300,
      zoomView: true,
      dragView: true,
      dragNodes: true
    }
  };

  if (layoutType === 'hierarchical') {
    return {
      ...base,
      layout: {
        hierarchical: {
          direction: 'UD',
          sortMethod: 'directed',
          levelSeparation: 140,
          nodeSpacing: 200,
          treeSpacing: 220
        }
      },
      physics: false
    };
  } else {
    return {
      ...base,
      physics: {
        enabled: true,
        solver: 'forceAtlas2Based',
        forceAtlas2Based: {
          gravitationalConstant: -120,
          springLength: 200,
          springConstant: 0.04,
          damping: 0.5,
          avoidOverlap: 0.8
        },
        stabilization: { iterations: 300 }
      }
    };
  }
}


// ─── Network ──────────────────────────────────────────────
let network = null;

function renderNetwork() {
  const container = document.getElementById('graph-container');
  const data = {
    nodes: new vis.DataSet(buildVisNodes()),
    edges: new vis.DataSet(buildVisEdges())
  };
  network = new vis.Network(container, data, getLayoutOptions());

  network.once('stabilizationIterationsDone', function() {
    network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' }});
  });

  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      const node = graphNodes.find(n => n.id === params.nodes[0]);
      if (node) showNodeDetails(node);
    } else if (params.edges.length > 0) {
      const idx = parseInt(params.edges[0].replace('e', ''));
      if (graphEdges[idx]) showEdgeDetails(graphEdges[idx]);
    } else {
      closeDetails();
    }
  });
}


// ─── Details panel ───────────────────────────────────────
function showNodeDetails(node) {
  const panel = document.getElementById('details');
  document.getElementById('detail-title').textContent = node.label.replace(/\n/g, ' ');

  let html = '';
  html += field('Type', node.meta.type);
  html += field('Domain', `<span class="badge ${node.domain === 'HR' ? 'badge-cross' : 'badge-intra'}">${node.domain}</span>`);
  for (const [k, v] of Object.entries(node.meta)) {
    if (k === 'type') continue;
    html += field(k.replace(/_/g, ' '), v);
  }

  const edges = graphEdges.filter(e => e.from === node.id || e.to === node.id);
  if (edges.length) {
    html += '<div class="field"><div class="field-label">Relationships</div><div class="field-value">';
    edges.forEach(e => {
      const dir = e.from === node.id ? 'out' : 'in';
      const other = dir === 'out' ? e.to : e.from;
      const cls = e.cross ? 'badge-cross' : 'badge-intra';
      html += `<div style="margin-bottom:3px"><span class="badge ${cls}">${e.label}</span> <span style="color:#555">${dir === 'out' ? '&rarr;' : '&larr;'}</span> ${other}</div>`;
    });
    html += '</div></div>';
  }

  document.getElementById('detail-content').innerHTML = html;
  panel.classList.add('visible');
}

function showEdgeDetails(edge) {
  const panel = document.getElementById('details');
  const src = graphNodes.find(n => n.id === edge.from);
  const tgt = graphNodes.find(n => n.id === edge.to);
  document.getElementById('detail-title').textContent = edge.label;

  let html = '';
  html += field('Relationship', edge.label);
  html += field('From', `${src.label.replace(/\n/g,' ')} <span style="color:#555">(${src.domain})</span>`);
  html += field('To', `${tgt.label.replace(/\n/g,' ')} <span style="color:#555">(${tgt.domain})</span>`);
  html += field('Type', `<span class="badge ${edge.cross ? 'badge-cross' : 'badge-intra'}">${edge.cross ? 'Cross-domain' : 'Intra-domain'}</span>`);

  document.getElementById('detail-content').innerHTML = html;
  panel.classList.add('visible');
}

function field(label, value) {
  return `<div class="field"><div class="field-label">${label}</div><div class="field-value">${value}</div></div>`;
}

function closeDetails() {
  document.getElementById('details').classList.remove('visible');
}


// ─── Controls ────────────────────────────────────────────
function zoomIn()  { network.moveTo({ scale: network.getScale() * 1.3, animation: true }); }
function zoomOut() { network.moveTo({ scale: network.getScale() / 1.3, animation: true }); }
function fitAll()  { network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' }}); }

document.getElementById('layout-select').addEventListener('change', function() {
  renderNetwork();
});


// ─── Stats + boot ────────────────────────────────────────
document.getElementById('s-nodes').textContent = graphNodes.length;
document.getElementById('s-edges').textContent = graphEdges.length;
document.getElementById('s-domains').textContent = new Set(graphNodes.map(n => n.domain)).size;
document.getElementById('s-depth').textContent = '3';

renderNetwork();
</script>
</body>
</html>
